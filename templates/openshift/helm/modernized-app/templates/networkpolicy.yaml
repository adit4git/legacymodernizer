{{ "{{- if .Values.networkPolicy.enabled }}" }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ "{{ .Release.Name }}-default-deny" }}
spec:
  podSelector: {}
  policyTypes: [Ingress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ "{{ .Release.Name }}-allow-ingress" }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: ui
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { network.openshift.io/policy-group: ingress }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ "{{ .Release.Name }}-allow-ui-to-api" }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: api
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels: { app.kubernetes.io/component: ui }
      ports:
        - { protocol: TCP, port: 8080 }
{{ "{{- end }}" }}
