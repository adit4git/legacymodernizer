apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ "{{ .Release.Name }}-api" }}
  annotations:
    haproxy.router.openshift.io/hsts_header: max-age=31536000;includeSubDomains;preload
spec:
  host: {{ "{{ .Values.route.api.host }}" }}
  to:
    kind: Service
    name: {{ "{{ .Release.Name }}-api" }}
  port:
    targetPort: http
  tls:
    termination: {{ "{{ .Values.route.api.tls.termination }}" }}
    insecureEdgeTerminationPolicy: {{ "{{ .Values.route.api.tls.insecureEdgeTerminationPolicy }}" }}
